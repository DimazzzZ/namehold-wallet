name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck · build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm build` runs `tsc -b` (typecheck) then `vite build` (bundle) — fails on
      # a type error or a broken build.
      - name: Typecheck + build
        run: pnpm build

      - name: Unit tests
        run: pnpm exec vitest run

  rust:
    name: Rust (cargo test · fmt/clippy advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 links webkit2gtk on Linux, so the crate must compile against the
      # system GUI libraries even just to run `cargo test`.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Required gate. The env-gated live-node integration tests skip automatically
      # (no HNS_IT_NODE_URL set), so this stays fast and offline.
      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      # Advisory: report style/lint without blocking CI (the crate currently carries
      # intentional dead-code warnings). Promote to required after a cleanup pass.
      - name: Format check (advisory)
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets
